<script>
// 初始化日期
document.addEventListener('DOMContentLoaded', () => {
    const dateInput = document.getElementById('uploadDate');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
});

// 照片預覽邏輯
function setupImagePreview(inputId, previewId) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);

    input.addEventListener('change', function () {
        preview.innerHTML = ''; // 清空預覽
        const files = this.files;

        if (files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        preview.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
    });
}

setupImagePreview('poPhoto', 'poPhotoPreview');
setupImagePreview('physicalPhoto', 'physicalPhotoPreview');

// 顯示提示訊息
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast show ${type}`;

    setTimeout(() => {
        toast.className = 'toast hidden';
    }, 3000);
}

// 圖片壓縮轉換 Base64
function compressImage(file, maxWidth = 1024, maxHeight = 1024, quality = 0.7) {
    return new Promise((resolve, reject) => {
        if (!file) return resolve(null);

        const reader = new FileReader();
        reader.onload = function (event) {
            const img = new Image();
            img.onload = function () {
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round(height *= maxWidth / width);
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = Math.round(width *= maxHeight / height);
                        height = maxHeight;
                    }
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const dataUrl = canvas.toDataURL('image/jpeg', quality);
                const base64Data = dataUrl.split(',')[1];
                resolve({
                    name: file.name,
                    mimeType: 'image/jpeg',
                    data: base64Data
                });
            };
            img.onerror = reject;
            img.src = event.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// 表單提交處理
document.getElementById('iqcForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const formElement = this;
    const submitBtn = document.getElementById('submitBtn');
    const btnText = submitBtn.querySelector('.btn-text');
    const spinner = submitBtn.querySelector('.spinner');

    // 變更按鈕狀態
    submitBtn.disabled = true;
    btnText.textContent = '資料上傳中...';
    spinner.classList.remove('hidden');

    try {
        const formData = new FormData(formElement);
        const data = Object.fromEntries(formData.entries());

        // 處理圖片上傳
        const poPhotoFile = document.getElementById('poPhoto').files[0];
        const physicalPhotoFile = document.getElementById('physicalPhoto').files[0];

        if (poPhotoFile) {
            data.poPhotoBase64 = await compressImage(poPhotoFile);
        }
        if (physicalPhotoFile) {
            data.physicalPhotoBase64 = await compressImage(physicalPhotoFile);
        }

        // 移除無法被 google.script.run 序列化的 File 物件
        delete data.poPhoto;
        delete data.physicalPhoto;

        // 使用 google.script.run 呼叫後端
        google.script.run
            .withSuccessHandler((result) => {
                if (result.status === 'success') {
                    showToast('檢驗紀錄上傳成功！');
                    formElement.reset();
                    document.getElementById('uploadDate').value = new Date().toISOString().split('T')[0];
                    document.getElementById('poPhotoPreview').innerHTML = '';
                    document.getElementById('physicalPhotoPreview').innerHTML = '';
                } else {
                    showToast(result.message || '伺服器發生錯誤', 'error');
                }
                submitBtn.disabled = false;
                btnText.textContent = '送出檢驗紀錄';
                spinner.classList.add('hidden');
            })
            .withFailureHandler((error) => {
                console.error('Error!', error);
                showToast('上傳失敗，請檢查網路連線後重試', 'error');
                submitBtn.disabled = false;
                btnText.textContent = '送出檢驗紀錄';
                spinner.classList.add('hidden');
            })
            .submitIQCData(data);

    } catch (error) {
        console.error('Error!', error.message);
        showToast('處理資料時發生錯誤', 'error');
        submitBtn.disabled = false;
        btnText.textContent = '送出檢驗紀錄';
        spinner.classList.add('hidden');
    }
});
</script>
